name: Deploy to Hostinger

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Push dist to deploy branch
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          # Fetch dist branch or create it
          git fetch origin dist 2>/dev/null || true
          git checkout dist 2>/dev/null || git checkout --orphan dist
          # Remove old files
          git rm -rf . --quiet 2>/dev/null || true
          # Copy new build
          cp -r dist/. .
          rm -rf dist
          git add -A
          git diff --staged --quiet || git commit -m "Deploy $(date +%Y%m%d%H%M%S)"
          git push origin dist
