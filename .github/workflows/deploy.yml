name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Deploy via curl FTP
        timeout-minutes: 20
        env:
          FTP_HOST: ftp.silver-stork-176589.hostingersite.com
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          REMOTE_DIR: /home/u826055601/domains/silver-stork-176589.hostingersite.com/public_html
        run: |
          find ./dist -type f | while read file; do
            remote_path="${file#./dist/}"
            curl --retry 3 \
                 --max-time 60 \
                 --ftp-create-dirs \
                 -u "$FTP_USER:$FTP_PASS" \
                 -T "$file" \
                 "ftp://$FTP_HOST$REMOTE_DIR/$remote_path"
          done
          echo "Deploy completado"
